<nav class="navbar">

  <div class="logo">
    {{ brandName }}
  </div>

  <button class="mobile-btn" (click)="toggleMobileMenu()">
    ☰
  </button>

</nav>

<div
  class="sidebar"
  [class.open]="isMobileMenuOpen"
>

  <ul>

    <li
      *ngFor="let item of menuItems"
      (click)="setActive(item)"
      [class.active]="activeMenu === item"
    >
      {{ item }}
    </li>

  </ul>

</div>
