<div class="counter-container">
  <h3>Counter: {{ count }}</h3>

  <p>
    This component is used to demonstrate Angular unit testing. Test cases cover
    component creation, state changes, method execution, UI rendering, and button
    click functionality.
  </p>

  <button class="increment" (click)="increment()">+</button>

  <button class="decrement" (click)="decrement()">-</button>

  <button class="reset" (click)="reset()">Reset</button>
</div>
