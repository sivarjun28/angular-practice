<h1>Admin Panel</h1>

<table>

    <thead>

        <tr>

            <th>Name</th>

            <th>Role</th>

            <th>Status</th>

        </tr>

    </thead>

    <tbody>

        @for(user of users; track user.id) {

        <tr>

            <td>{{ user.name }}</td>

            <td>{{ user.role }}</td>

            <td>{{ user.status }}</td>

        </tr>

        }

    </tbody>

</table>
