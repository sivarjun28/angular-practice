<div class="filters">

    <input type="text" [ngModel]="searchTerm" (ngModelChange)="onSearchChange($event)"
        placeholder="🔍 Search products..." />

    <select [ngModel]="selectedCategory" (ngModelChange)="onCategoryChange($event)">
        <option value="">All Categories</option>
        <option *ngFor="let cat of categories" [value]="cat">
            {{ cat }}
        </option>
    </select>

    <div class="price-filter">
        <label>Max Price: ${{ maxPrice }}</label>
        <input type="range" min="0" max="1000" [ngModel]="maxPrice" (ngModelChange)="onPriceChange($event)" />
    </div>

</div>
