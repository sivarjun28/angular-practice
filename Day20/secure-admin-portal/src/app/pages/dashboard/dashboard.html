<div class="dashboard-container">
    <header>
        <h1>
            Welcome {{userName}}
        </h1>
        <div>
            <input type="text" placeholder="Search" [(ngModel)]="searchText">
            <button>
                🔔
            </button>
            <button (click)="logout()">
                Logout
            </button>
        </div>
    </header>
    <section class="stats">
        <div class="card" *ngFor="let item of stats">
            <h2>
                {{item.icon}}
            </h2>
            <h3>
                {{item.value}}
            </h3>
            <p>
                {{item.title}}
            </p>
        </div>

    </section>

    <section class="actions">

        <button (click)="openProfile()">

            Profile

        </button>

        <button (click)="openAdmin()">

            Admin Panel

        </button>

        <button>

            Reports

        </button>

        <button>

            Settings

        </button>

    </section>

    <section class="activities">

        <h2>

            Recent Activities

        </h2>

        <ul>

            <li *ngFor="let activity of activities">

                {{activity}}

            </li>

        </ul>

    </section>

</div>
