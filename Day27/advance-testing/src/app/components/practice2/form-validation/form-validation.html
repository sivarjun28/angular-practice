<div class="register-container">
    <h2>📝 Register</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="form-group">
            <input formControlName="name" placeholder="Enter your name">

            <div class="error" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
                Name is required
            </div>
        </div>

        <div class="form-group">
            <input formControlName="email" placeholder="Enter your email">

            <div class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                Valid email required
            </div>
        </div>

        <div class="button-group">
            <button type="submit">Submit</button>
            <button type="button" class="reset-btn" (click)="reset()">
                Reset
            </button>
        </div>

    </form>
</div>
