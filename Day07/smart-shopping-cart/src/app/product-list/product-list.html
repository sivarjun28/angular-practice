<div class="products-container">
    <h2>Products</h2>

    <div class="product-card" *ngFor="let product of products">

        <img [src]="product.image">
        <h3>{{ product.name }}</h3>
        <p>₹ {{ product.price }}</p>

        <button (click)="addProduct(product)">Add to Cart</button>
    </div>
</div>
