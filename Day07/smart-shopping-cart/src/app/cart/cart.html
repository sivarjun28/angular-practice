<div class="cart-container">
    <h2>Shopping Cart</h2>

    <p *ngIf="cart.getCartItems().length == 0">
        Cart is Empty
    </p>
    <div class="cart-item" *ngFor="let item of cart.getCartItems(); let i = index">
        <div>
            <h3>{{ item.name }}</h3>

            <p>₹ {{ item.price }}</p>
        </div>

        <button class="remove-btn" (click)="
        cart.removeItem(i)
      ">
            Remove
        </button>
    </div>

    <h3 *ngIf="
      cart.getCartItems().length > 0
    ">

        Total:
        ₹ {{ cart.getTotalPrice() }}

    </h3>

    <button class="clear-btn" *ngIf="cart.getCartItems().length >= 0" (click)="cart.clearCart()">
        Clear Cart  
    </button>
</div>
