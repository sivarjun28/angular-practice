<h1 class="page-title">
    🎬 Movies
</h1>

<div class="movies-grid">
    <div class="movie-card" *ngFor="let movie of movies">
        <img [src]="movie.image">
        <div class="movie-content">
            <h2>
                {{ movie.title }}
            </h2>
            <p>
                {{ movie.categpry }}
            </p>
            <span>
                ⭐ {{ movie.rating }}
            </span>

            <button (click)="addMovie(movie)">
                + Watchlist
            </button>
        </div>

    </div>
</div>
