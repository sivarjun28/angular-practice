<div class="movies-grid">
    <div class="movie-card" *ngFor="let movie of movies">
        <img [src]="movie.image" />

        <h2>{{ movie.title}}</h2>

        <p>{{ movie.category }}</p>
        <small>{{ movie.description }}</small>

        <button [routerLink]="[
                '/movie',
                movie.id,
                movie.category
            ]">

            View Details

        </button>
    </div>
</div>
