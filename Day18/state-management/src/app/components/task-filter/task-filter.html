<div class="filter-container">

    <h2>Filter Tasks</h2>

    <div class="filter-buttons">

        <button (click)="setFilter('all')">
            All
        </button>

        <button (click)="setFilter('completed')">
            Completed
        </button>

        <button (click)="setFilter('pending')">
            Pending
        </button>

        <button (click)="setFilter('favorite')">
            Favorites
        </button>

    </div>

</div>
