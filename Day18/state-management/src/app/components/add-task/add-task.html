<div class="container">

  <h2>Task Manager</h2>

  <input
    type="text"
    [(ngModel)]="title"
    placeholder="Enter task title"/>

  <select [(ngModel)]="priority">
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
  </select>

  <button (click)="addTask()">
    Add Task
  </button>

</div>
